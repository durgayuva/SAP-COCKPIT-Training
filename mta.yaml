_schema-version: 3.3.0
ID: PR_APPROVAL
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: PR_APPROVAL-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: PR_APPROVAL-auth
      - name: PR_APPROVAL-db
      - name: PR_APPROVAL-destination

  - name: PR_APPROVAL-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: PR_APPROVAL-db

  - name: PR_APPROVAL-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: PR_APPROVAL-auth
      - name: srv-api
      - name: PR_APPROVAL-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: resources/
      requires:
        - name: PR_APPROVALpr_approval
          artifacts:
            - pr_approval.zip
          target-path: resources/

  - name: PR_APPROVALpr_approval
    type: html5
    path: app/pr_approval
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: req-srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet

  - name: PR_APPROVAL-destinations
    type: com.sap.application.content
    requires:
      - name: PR_APPROVAL-auth
        parameters:
          service-key:
            name: PR_APPROVAL-auth-key
      - name: PR_APPROVAL-html5-repo-host
        parameters:
          service-key:
            name: PR_APPROVAL-html5-repo-host-key
      - name: srv-api
      - name: PR_APPROVAL-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: PR_APPROVAL-html5-repository
              ServiceInstanceName: PR_APPROVAL-html5-repo-host
              ServiceKeyName: PR_APPROVAL-html5-repo-host-key
              sap.cloud.service: PR_APPROVAL.service
            - Name: PR_APPROVAL-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: PR_APPROVAL-auth
              ServiceKeyName: PR_APPROVAL-auth-key
              sap.cloud.service: PR_APPROVAL.service

resources:
  - name: PR_APPROVAL-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: PR_APPROVAL-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'ModuleLeadRole (PR_APPROVAL ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.ModuleLeadRole'
          - name: 'RORole (PR_APPROVAL ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.RORole'
          - name: 'HODRole (PR_APPROVAL ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.HODRole'
  - name: PR_APPROVAL-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: PR_APPROVAL-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: PR_APPROVAL-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
